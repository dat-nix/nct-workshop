<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — NexCore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">Nex<span class="logo-accent">Core</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact" class="active">Contact</a>
    </div>
  </div>
</nav>

<main class="page-main">
  <div class="page-header">
    <h1>Contact</h1>
    <p class="page-sub">Have a question? We’re always happy to hear from you.</p>
  </div>

  <div class="contact-grid">
    <div class="contact-info">
      <div class="contact-item">
        <span class="contact-icon">📧</span>
        <div>
          <p class="contact-label">Email</p>
          <p>hello@nexcore.dev</p>
        </div>
      </div>

      <div class="contact-item">
        <span class="contact-icon">📍</span>
        <div>
          <p class="contact-label">Address</p>
          <p>Innovation Hub Building, District 1, Ho Chi Minh City</p>
        </div>
      </div>

      <div class="contact-item">
        <span class="contact-icon">🕐</span>
        <div>
          <p class="contact-label">Working Hours</p>
          <p>Monday – Friday, 9:00 – 18:00</p>
        </div>
      </div>
    </div>

    <div class="contact-form-box">
      <div class="field">
        <label>Full Name</label>
        <input type="text" placeholder="Nguyen Van A" disabled>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="example@email.com" disabled>
      </div>

      <div class="field">
        <label>Message</label>
        <textarea placeholder="Your message..." disabled></textarea>
      </div>

      <button disabled class="btn-primary" style="opacity:0.5;cursor:not-allowed">
        Send (coming soon)
      </button>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 NexCore Inc. · <a href="/">Home</a> · <a href="/about">About</a></p>
</footer>

</body>
</html>
