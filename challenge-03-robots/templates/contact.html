<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — NexCore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">Nex<span class="logo-accent">Core</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact" class="active">Contact</a>
    </div>
  </div>
</nav>

<main class="page-main">
  <div class="page-header">
    <h1>Liên hệ</h1>
    <p class="page-sub">Có câu hỏi? Chúng tôi luôn sẵn sàng lắng nghe.</p>
  </div>

  <div class="contact-grid">
    <div class="contact-info">
      <div class="contact-item">
        <span class="contact-icon">📧</span>
        <div>
          <p class="contact-label">Email</p>
          <p>hello@nexcore.dev</p>
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">📍</span>
        <div>
          <p class="contact-label">Địa chỉ</p>
          <p>Tòa nhà Innovation Hub, Quận 1, TP. HCM</p>
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">🕐</span>
        <div>
          <p class="contact-label">Giờ làm việc</p>
          <p>Thứ 2 – Thứ 6, 9:00 – 18:00</p>
        </div>
      </div>
    </div>

    <div class="contact-form-box">
      <div class="field">
        <label>Họ tên</label>
        <input type="text" placeholder="Nguyễn Văn A" disabled>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="example@email.com" disabled>
      </div>
      <div class="field">
        <label>Tin nhắn</label>
        <textarea placeholder="Nội dung..." disabled></textarea>
      </div>
      <button disabled class="btn-primary" style="opacity:0.5;cursor:not-allowed">Gửi (coming soon)</button>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 NexCore Inc. · <a href="/">Home</a> · <a href="/about">About</a></p>
</footer>

</body>
</html>
