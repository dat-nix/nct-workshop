<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCT — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1f1f2e;
    --text: #e2e8f0;
    --muted: #4a5568;
    --accent: #6366f1;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  nav {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .nav-inner {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .logo span { color: var(--accent); }

  .nav-tag {
    font-size: 0.75rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 99px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 32px 80px;
    animation: fadeUp 0.5s ease both;
  }

  .page-header {
    margin-bottom: 36px;
  }

  .page-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .page-header p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .photo-wrap {
    position: relative;
    width: 100%;
  }

  .photo-wrap img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .photo-meta {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .photo-info p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .photo-info strong {
    font-size: 0.95rem;
    color: var(--text);
  }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .download-btn:hover { opacity: 0.85; }

  footer {
    text-align: center;
    padding: 28px;
    font-size: 0.8rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    main { padding: 32px 16px 60px; }
    .photo-meta { flex-direction: column; align-items: flex-start; gap: 14px; }
    nav { padding: 0 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="logo">Neo Culture <span>Tech</span></span>
    <span class="nav-tag">📷 Team Gallery</span>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Team Memories 📸</h1>
    <p>
      A memorable moment from the NCT team.<br>
      Download the image — you might find something interesting inside.
    </p>
  </div>

  <div class="photo-card">
    <div class="photo-wrap">
      <img src="/static/nct.jpg" alt="NCT Team Photo">
    </div>
    <div class="photo-meta">
      <div class="photo-info">
        <strong>NCT Team — 2024</strong>
        <p>Neo Culture Technology Club · RMIT Vietnam</p>
      </div>
      <a href="/static/nct.jpg" download="nct.jpg" class="download-btn">
        ⬇ Download Image
      </a>
    </div>
  </div>

</main>

<footer>© 2026 Neo Culture Technology Club</footer>

</body>
</html>
