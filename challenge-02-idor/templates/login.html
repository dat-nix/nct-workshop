<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NCT CTF</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-badge">NCT</span>
      <span class="logo-text">CTF · Challenge 02</span>
    </div>

    <h1>User Profiles</h1>
    <p class="login-sub">Đăng nhập để xem hệ thống quản lý người dùng.</p>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="off" spellcheck="false" placeholder="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••">
      </div>
      <button type="submit">Đăng nhập →</button>
    </form>

    <div class="creds-box">
      <p class="creds-title">🔑 Tài khoản được cấp</p>
      <div class="creds-row"><span>Username</span><code>workshop_user</code></div>
      <div class="creds-row"><span>Password</span><code>nct2026</code></div>
    </div>

    <div class="objective-box">
      <p class="objective-title">🎯 Mục tiêu</p>
      <p>Hệ thống có <strong>10 người dùng</strong>. Tìm tài khoản đặc biệt và lấy flag ẩn trong profile đó.</p>
    </div>

  </div>
</div>
</body>
</html>
